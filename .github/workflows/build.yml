name: Build Clinic CRM Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Fix package.json and Icons
        shell: bash
        run: |
          # 1. تعديل أي إشارة لـ icon.png جوة الـ package.json وخليها icon.ico
          if [ -f package.json ]; then
            sed -i 's/icon.png/icon.ico/g' package.json
            sed -i 's/icon_1024.png/icon.ico/g' package.json
            echo "📝 package.json updated to strictly use icon.ico!"
          fi

          # 2. تنظيف كلي لأي ملفات png متبقية
          rm -f icon.png
          rm -f icon_1024.png
          rm -f build/icon.png
          rm -f build/icon_1024.png

          # 3. التأكد من وجود مجلد build ونقل الـ ico جواه وفي الـ root
          mkdir -p build
          if [ -f icon.ico ]; then
            cp icon.ico build/icon.ico
          fi

          echo "🧹 Icons layout rearranged perfectly!"

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        env:
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npm run build:win -- --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clinic-CRM-Dist
          path: dist/
          retention-days: 30
